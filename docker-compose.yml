services:

  # ── Shared database for Python microservices (lingo-db) ──────────────────────
  db:
    image: postgres:16-alpine
    container_name: lingo-auth-db
    environment:
      POSTGRES_USER: lingo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lingo}
      POSTGRES_DB: lingo_db
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingo -d lingo_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lingo-net
    restart: unless-stopped

  # ── Quest Service (8001) ─────────────────────────────────────────────────────
  quest-service:
    build:
      context: .
      dockerfile: quest-service/Dockerfile
    container_name: lingo-quest-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lingo:${DB_PASSWORD:-lingo}@db:5432/lingo_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lingo-net
    # Mount source for local dev — remove in production
    volumes:
      - ./quest-service:/app
    restart: unless-stopped

  # ── Card Service (8002) ──────────────────────────────────────────────────────
  card-service:
    build:
      context: .
      dockerfile: card-service/Dockerfile
    container_name: lingo-card-service
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lingo:${DB_PASSWORD:-lingo}@db:5432/lingo_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lingo-net
    volumes:
      - ./card-service:/app
    restart: unless-stopped

  # ── Challenge Service (8003) ─────────────────────────────────────────────────
  challenge-service:
    build: ./challenge-service
    container_name: lingo-challenge-service
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lingo:${DB_PASSWORD:-lingo}@db:5432/lingo_db
      # Quest service is resolved by Docker's internal DNS
      QUEST_SERVICE_URL: http://quest-service:8001
    depends_on:
      db:
        condition: service_healthy
      quest-service:
        condition: service_started
    networks:
      - lingo-net
    volumes:
      - ./challenge-service:/app
    # For Ollama access from inside Docker on macOS/Windows:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Game Backend (4000) ──────────────────────────────────────────────────────
  game-backend:
    build:
      context: ./game-backend
      dockerfile: Dockerfile
    container_name: lingo-game-backend
    env_file:
      - ./game-backend/.env.docker
    environment:
      # Override to talk to the backend service on the Docker network
      AUTH_SERVICE_URL: http://backend:3000/api
    ports:
      - "4000:4000"
    depends_on:
      quest-service:
        condition: service_started
      card-service:
        condition: service_started
      challenge-service:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - lingo-net
    restart: unless-stopped

  # ── Backend Postgres for Node auth API (5434) ────────────────────────────────
  backend-db:
    image: postgres:17.4
    container_name: lingo_backend_auth_db
    restart: always
    environment:
      TZ: Europe/Helsinki
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: projectdb
    ports:
      - "5434:5432"   # backend/.env expects DB_PORT=5434, DB_HOST=localhost for local dev
    volumes:
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backend/db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d projectdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lingo-net

  # ── Node Auth Backend (3000) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lingo-auth-backend
    # Reuse existing backend/.env for PORT, DB_USER, DB_PASSWORD, DB_NAME,
    # SALT_ROUNDS, JWT_SECRET, JWT_EXPIRATION, etc. (no secrets in compose)
    env_file:
      - ./backend/.env
    environment:
      # Only override wiring so it talks to backend-db over Docker network
      DB_HOST: backend-db
      DB_PORT: 5432
    ports:
      - "3000:3000"
    depends_on:
      backend-db:
        condition: service_healthy
    networks:
      - lingo-net
    restart: unless-stopped

volumes:
  db-data:

networks:
  lingo-net:
    driver: bridge